<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste API - Sistema de Permutas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      background: #ffffff;
      color: #102a43;
      text-align: center;
    }

    button {
      width: 100%;
      max-width: 360px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #0b5cad;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    #resultado {
      margin-top: 20px;
      padding: 16px;
      border-radius: 14px;
      background: #eef5ff;
      font-weight: bold;
      line-height: 1.4;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <h1>Sistema de Permutas</h1>
  <p>Teste de comunicação GitHub → Apps Script</p>

  <button onclick="testarApi()">Testar conexão</button>

  <div id="resultado">Aguardando teste...</div>

  <script>
    const URL_API = "https://script.google.com/macros/s/AKfycbzGMUdOXzqeQ8mot5KUJGl4f2-P1SZjO0Pfq3CWFssWmTjClpf_vUAPXhyYx5PYL5q4lQ/exec";

    async function testarApi() {
      const resultado = document.getElementById("resultado");
      resultado.textContent = "Testando...";

      try {
        const resposta = await fetch(URL_API, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            acao: "teste"
          })
        });

        const dados = await resposta.json();

        resultado.textContent = JSON.stringify(dados, null, 2);

      } catch (erro) {
        resultado.textContent =
          "Erro no teste: " + erro.message;
      }
    }
  </script>
</body>
</html>
